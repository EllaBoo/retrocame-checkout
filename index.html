<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Оформление заказа — Retrocam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f4f4;color:#111;min-height:100vh}
.wrap{max-width:1020px;margin:0 auto;padding:36px 16px 80px}
.logo{margin-bottom:40px}
.logo a{text-decoration:none;display:flex;align-items:center;gap:12px}



.grid{display:grid;grid-template-columns:1fr 420px;gap:28px;align-items:start}
@media(max-width:820px){.grid{grid-template-columns:1fr}.sc{order:-1}}
.card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 2px 20px rgba(0,0,0,.05);margin-bottom:24px}
.card:last-child{margin-bottom:0}
h2{font-size:12px;font-weight:800;margin-bottom:20px;padding-bottom:14px;border-bottom:1.5px solid #f0f0f0;display:flex;align-items:center;gap:10px;color:#111;text-transform:uppercase;letter-spacing:.6px}
.num{display:inline-flex;width:24px;height:24px;background:#111;color:#fff;border-radius:50%;font-size:11px;font-weight:800;align-items:center;justify-content:center;flex-shrink:0}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
input,select{width:100%;padding:14px 16px;border:1.5px solid #ebebeb;border-radius:12px;font-size:15px;outline:none;background:#fafafa;color:#111;transition:border .15s;-webkit-appearance:none;font-family:inherit}
input:focus,select:focus{border-color:#111;background:#fff}
input::placeholder{color:#ccc}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{display:block;width:100%;padding:18px;background:#111;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f5f5f5;gap:14px}
.item:last-child{border-bottom:none}
.item-icon{width:40px;height:40px;border-radius:8px;background:#f5f5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.item-info{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;line-height:1.4;color:#111;word-break:break-word}
.imeta{font-size:12px;color:#bbb;margin-top:3px}
.iprice{font-size:15px;font-weight:700;white-space:nowrap;color:#111;flex-shrink:0}
.dv{height:1px;background:#f0f0f0;margin:16px 0}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;color:#999}
.sr .v{color:#111}
.sr .v-gray{color:#888;font-style:italic}
.tr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 0;margin-top:12px;border-top:2px solid #111;font-size:22px;font-weight:900;color:#111}
.bg{background:#f7f7f7;border-radius:12px;padding:14px 16px;font-size:12px;color:#888;margin-top:18px;line-height:1.8}
.req{color:#e53935}
.err{display:none;color:#c62828;font-size:13px;margin-top:12px;padding:13px 16px;background:#fff5f5;border-radius:12px;border:1px solid #ffcdd2}
.empty{color:#ccc;font-size:14px;text-align:center;padding:32px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <a href="https://retrocam.ru">
      <img src="https://raw.githubusercontent.com/EllaBoo/retrocame-checkout/main/logo.png" alt="Retrocam" style="height:52px;width:auto;display:block">
    </a>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <h2><span class="num">1</span>Контактные данные</h2>
        <div class="field"><label>Имя и фамилия <span class="req">*</span></label><input id="fn" placeholder="Иван Иванов" autocomplete="name"></div>
        <div class="field"><label>Email <span class="req">*</span></label><input id="fe" type="email" placeholder="ivan@example.com" autocomplete="email"></div>
        <div class="field"><label>Телефон / WhatsApp <span class="req">*</span></label><input id="fp" type="tel" placeholder="+7 900 000 00 00" autocomplete="tel"></div>
      </div>
      <div class="card">
        <h2><span class="num">2</span>Адрес доставки</h2>
        <div class="field"><label>Страна</label>
          <select id="fc"><option>Россия</option><option>Казахстан</option><option>Беларусь</option><option>Армения</option><option>Грузия</option><option>Узбекистан</option><option>Другая</option></select>
        </div>
        <div class="field"><label>Регион / Область <span class="req">*</span></label><input id="freg" placeholder="Московская область"></div>
        <div class="r2">
          <div class="field"><label>Город <span class="req">*</span></label><input id="fcity" placeholder="Москва"></div>
          <div class="field"><label>Индекс <span class="req">*</span></label><input id="fzip" placeholder="101000"></div>
        </div>
        <div class="field"><label>Улица, дом, квартира <span class="req">*</span></label><input id="faddr" placeholder="ул. Ленина, д. 1, кв. 1"></div>
        <div class="field"><label>Комментарий</label><input id="fcom" placeholder="Пожелания, удобное время..."></div>
        <div id="ferr" class="err"></div>
        <button class="btn" id="sbtn" onclick="sub_()">Подтвердить заказ →</button>
      </div>
    </div>

    <div class="sc">
      <div class="card">
        <h2>Ваш заказ</h2>
        <div id="il"></div>
        <div class="dv"></div>
        <div class="sr"><span>Товары</span><span class="v" id="ss">—</span></div>
        <div class="sr"><span>Доставка</span><span class="v-gray">Уточняется</span></div>
        <div class="tr"><span>Итого</span><span id="st">—</span></div>
        <div class="bg">📦 <b>Стоимость и сроки доставки</b> уточним при подтверждении — свяжемся с вами в течение рабочего дня.</div>
      </div>
    </div>
  </div>
</div>

<script>
var SU = "https://script.google.com/macros/s/AKfycbz9Y_CusRT2byjUgON8gR-Gu8ULLfFrjRa5ZwCCCo4VUV-N-OCTillBi3FJ787H4ucyiw/exec";
var cartData = [], sub = 0, tw = 0;

function fm(n){ return Math.round(n).toLocaleString("ru-RU") + " ₽"; }
function es(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

(function init(){
  try {
    var raw = decodeURIComponent((location.search.match(/[?&]d=([^&]*)/) || [])[1] || "");
    if (!raw) { showEmpty(); return; }
    cartData = raw.split(";;").map(function(chunk){
      // split on first 3 pipes only → [title, qty, price, rest...]
      var p = chunk.split("|");
      return {
        t: p[0] || "",
        q: parseInt(p[1]) || 1,
        p: parseFloat(p[2]) || 0,   // price already in rubles (Math.round(shopify_price/100))
        g: parseInt(p[3]) || 0
      };
    }).filter(function(it){ return it.t.length > 0; });
  } catch(e) { cartData = []; }

  if (!cartData.length) { showEmpty(); return; }

  var list = document.getElementById("il");
  sub = 0; tw = 0;

  cartData.forEach(function(it){
    var q = it.q;
    var pr = it.p;   // rubles
    var g  = it.g;
    sub += pr * q;
    tw  += g  * q;

    var d = document.createElement("div");
    d.className = "item";
    var wt = ""; // кг removed
    d.innerHTML =
      '<div class="item-icon">🎞️</div>' +
      '<div class="item-info"><div class="iname">' + es(it.t) + '</div>' +
      '<div class="imeta">× ' + q + '</div></div>' +
      '<div class="iprice">' + fm(pr * q) + '</div>';
    list.appendChild(d);
  });

  document.getElementById("ss").textContent = fm(sub);
  document.getElementById("st").textContent = fm(sub) + " + доставка";
})();

function showEmpty(){
  document.getElementById("il").innerHTML = '<div class="empty">Корзина пуста</div>';
}

function sub_(){
  var n    = document.getElementById("fn").value.trim();
  var em   = document.getElementById("fe").value.trim();
  var ph   = document.getElementById("fp").value.trim();
  var reg  = document.getElementById("freg").value.trim();
  var city = document.getElementById("fcity").value.trim();
  var zip  = document.getElementById("fzip").value.trim();
  var addr = document.getElementById("faddr").value.trim();
  var country = document.getElementById("fc").value;
  var com  = document.getElementById("fcom").value.trim();
  var err  = document.getElementById("ferr");

  if (!n||!em||!ph||!reg||!city||!zip||!addr){
    err.style.display="block"; err.textContent="Заполните все обязательные поля (*)"; return;
  }
  if (em.indexOf("@")<0){
    err.style.display="block"; err.textContent="Введите корректный email"; return;
  }
  err.style.display="none";
  var btn=document.getElementById("sbtn"); btn.disabled=true; btn.textContent="Отправляем...";

  var prods = cartData.map(function(i){ return es(i.t)+" ×"+i.q; }).join("; ");

  var q = new URLSearchParams({
    submit:"1", name:n, email:em, phone:ph,
    country:country, region:reg, city:city, zip:zip, address:addr,
    products:prods,
    subtotal: sub.toFixed(2),
    shipping_cost: "0",
    total: sub.toFixed(2),
    weight: String(tw),
    comment: com,
    return_url: location.href.split("?")[0] + "?ok=1"
  });
  location.href = SU + "?" + q.toString();
}

if (location.search.indexOf("ok=1") > -1) {
  document.addEventListener("DOMContentLoaded", function(){
    document.querySelector(".wrap").innerHTML =
      '<div style="text-align:center;padding:80px 20px">' +
      '<div style="font-size:80px;margin-bottom:24px">✅</div>' +
      '<h1 style="font-size:28px;font-weight:900;color:#111;margin-bottom:12px">Заказ принят!</h1>' +
      '<p style="color:#999;font-size:16px;margin-bottom:8px">Мы свяжемся с вами в течение рабочего дня.</p>' +
      '<p style="color:#bbb;font-size:14px;margin-bottom:8px">Уточним стоимость и сроки доставки.</p>' +
      '<p style="color:#bbb;font-size:14px;margin-bottom:32px">На почту отправлено подтверждение.</p>' +
      '<a href="https://retrocam.ru" style="display:inline-block;padding:14px 28px;background:#111;color:#fff;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px">← Вернуться в магазин</a>' +
      '</div>';
  });
}
</script>
</body>
</html>
